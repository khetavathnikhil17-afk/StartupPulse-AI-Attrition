version: "3.8"

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: startuppulse-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models:ro
      - ./reports:/app/reports
      - ./data:/app/data:ro
    environment:
      - TF_CPP_MIN_LOG_LEVEL=3
      - TF_ENABLE_ONEDNN_OPTS=0
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
